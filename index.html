<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budsin Football</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
  --bg:#0b0c10; --card:#1f2833; --accent:#00ffcc;
  --blue:#45f3ff; --muted:#c5c6c7; --white:#fff; --red:#ff3b3b;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:var(--bg);color:var(--muted);min-height:100vh;display:flex;flex-direction:column}
header{padding:1.8rem 1rem;text-align:center;background:linear-gradient(180deg,rgba(69,243,255,.08) 0%,transparent 100%)}
h1{font-size:2rem;color:var(--white);text-transform:uppercase;letter-spacing:3px}
h1 span{color:var(--accent)}
.sub{font-size:.82rem;color:var(--blue);margin-top:.4rem;opacity:.8}
main{max-width:980px;margin:0 auto;padding:1rem 1.5rem 3rem;width:100%;flex:1}

.search{background:var(--card);border-radius:10px;padding:1rem;margin-bottom:1.5rem;border:1px solid rgba(255,255,255,.05)}
.search-inner{display:flex;gap:8px;background:rgba(0,0,0,.4);border-radius:8px;border:1px solid var(--blue)}
.search-inner input{flex:1;background:none;border:none;outline:none;color:var(--white);font-size:.95rem;padding:.6rem .8rem}
.search-inner input::placeholder{color:rgba(255,255,255,.25)}
.search-inner button{background:var(--blue);color:#0b0c10;border:none;padding:0 1.2rem;border-radius:6px;font-weight:700;cursor:pointer;font-size:.9rem;transition:background .2s;white-space:nowrap}
.search-inner button:hover{background:var(--accent)}

.sec-head{display:flex;align-items:center;gap:10px;margin-bottom:1rem;color:var(--white);font-size:1rem;font-weight:600}
.pulse{width:10px;height:10px;border-radius:50%;background:var(--red);flex-shrink:0;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,59,59,.7)}70%{box-shadow:0 0 0 8px rgba(255,59,59,0)}}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px}

.card{background:var(--card);border-radius:10px;padding:1.1rem 1rem;border:1px solid rgba(255,255,255,.05);border-left:4px solid var(--blue);display:flex;flex-direction:column;gap:.7rem}
.match-title{font-size:.85rem;font-weight:600;color:var(--white);text-align:center;line-height:1.3}
.teams{display:flex;justify-content:space-around;align-items:center}
.team{display:flex;flex-direction:column;align-items:center;width:42%;gap:4px}
.team img{width:40px;height:40px;object-fit:contain;border-radius:50%;background:rgba(255,255,255,.04);padding:3px}
.team-name{font-size:.72rem;font-weight:600;color:var(--white);text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%}
.vs{font-size:.8rem;font-weight:700;color:var(--accent)}
.streams{display:flex;flex-direction:column;gap:5px}

.btn-stream{background:rgba(69,243,255,.07);color:var(--blue);border:1px solid rgba(69,243,255,.3);padding:.42rem .6rem;border-radius:6px;font-size:.75rem;font-weight:700;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px;width:100%}
.btn-stream:hover{background:var(--blue);color:#0b0c10;border-color:var(--blue)}
.btn-stream:disabled{opacity:.5;cursor:wait}
.btn-load{background:rgba(0,255,204,.07);color:var(--accent);border-color:rgba(0,255,204,.3)}
.btn-load:hover{background:var(--accent);color:#0b0c10;border-color:var(--accent)}

.lang-label{font-size:.68rem;opacity:.45;margin:.35rem 0 .15rem;text-transform:uppercase;letter-spacing:.06em}
.badge-hd{font-size:.58rem;background:var(--accent);color:#0b0c10;border-radius:3px;padding:1px 4px;margin-left:3px;font-weight:800}
.badge-sd{font-size:.58rem;background:rgba(255,255,255,.1);color:var(--muted);border-radius:3px;padding:1px 4px;margin-left:3px}
.badge-viewers{font-size:.63rem;opacity:.55;margin-left:3px}

.info{text-align:center;padding:2.5rem;color:var(--muted);grid-column:1/-1;font-size:.9rem}
.err{color:var(--red)}

footer{text-align:center;padding:.8rem;font-size:.75rem;color:var(--blue);border-top:1px solid rgba(255,255,255,.05);margin-top:auto}
.dot-s{width:6px;height:6px;border-radius:50%;background:var(--accent);display:inline-block;box-shadow:0 0 5px var(--accent);margin-right:5px;vertical-align:middle}
</style>
</head>
<body>

<header>
  <h1>Budsin <span>Football</span></h1>
  <div class="sub">Partidos en vivo · Enrutados via proxy.budsin.dev</div>
</header>

<main>
  <div class="search">
    <div class="search-inner">
      <input id="url-input" type="text" placeholder="Pegar URL de partido externo...">
      <button onclick="openInProxy()"><i class="fa-solid fa-play"></i> Abrir en proxy</button>
    </div>
  </div>

  <div class="sec-head"><div class="pulse"></div>Partidos en vivo · Fútbol</div>
  <div class="grid" id="matches">
    <div class="info"><i class="fa-solid fa-spinner fa-spin"></i> Cargando partidos...</div>
  </div>
</main>

<footer><span class="dot-s"></span>Conexión cifrada · proxy.budsin.dev</footer>

<script>
const VPS = 'https://proxy.budsin.dev';

const LANG_FLAGS = {
  'English':    '🇬🇧',
  'Spanish':    '🇪🇸',
  'Portuguese': '🇵🇹',
  'French':     '🇫🇷',
  'German':     '🇩🇪',
  'Italian':    '🇮🇹',
  'Arabic':     '🇸🇦',
  'Turkish':    '🇹🇷',
  'Dutch':      '🇳🇱',
  'Russian':    '🇷🇺',
  'Romanian':   '🇷🇴',
  'Polish':     '🇵🇱',
  'Greek':      '🇬🇷',
};

function flag(lang) {
  return LANG_FLAGS[lang] || '🌐';
}

function openInProxy(url) {
  const target = url || document.getElementById('url-input').value.trim();
  if (!target) return;
  const full = /^https?:\/\//i.test(target) ? target : 'https://' + target;
  window.open(`${VPS}/browsing#${encodeURIComponent(full)}`, '_blank');
}

async function loadMatches() {
  const grid = document.getElementById('matches');
  try {
    const r = await fetch(`${VPS}/api/football/matches`);
    if (!r.ok) throw new Error(`Error ${r.status}`);
    const matches = await r.json();

    if (!Array.isArray(matches) || !matches.length) {
      grid.innerHTML = '<div class="info">No hay partidos en vivo ahora mismo.</div>';
      return;
    }

    grid.innerHTML = '';
    matches.forEach(m => renderCard(grid, m));

  } catch(e) {
    grid.innerHTML = `<div class="info err">
      <i class="fa-solid fa-triangle-exclamation"></i> ${e.message}
    </div>`;
  }
}

function renderCard(grid, m) {
  const home = m.teams?.home;
  const away = m.teams?.away;
  const homeBadge = home?.badge ? `${VPS}/api/football/badge/${home.badge}` : '';
  const awayBadge = away?.badge ? `${VPS}/api/football/badge/${away.badge}` : '';

  const card = document.createElement('div');
  card.className = 'card';

  card.innerHTML = `
    <div class="match-title">${m.title}</div>
    <div class="teams">
      <div class="team">
        ${homeBadge ? `<img src="${homeBadge}" loading="lazy" onerror="this.style.display='none'" alt="${home?.name || ''}">` : ''}
        <div class="team-name">${home?.name || 'Local'}</div>
      </div>
      <div class="vs">VS</div>
      <div class="team">
        ${awayBadge ? `<img src="${awayBadge}" loading="lazy" onerror="this.style.display='none'" alt="${away?.name || ''}">` : ''}
        <div class="team-name">${away?.name || 'Visitante'}</div>
      </div>
    </div>
    <div class="streams" id="streams-${m.id}">
      <button class="btn-stream btn-load" onclick="loadStreams('${m.id}', this)">
        <i class="fa-solid fa-satellite-dish"></i> Ver streams disponibles
      </button>
    </div>`;

  grid.appendChild(card);
}

async function loadStreams(matchId, btn) {
  const container = document.getElementById(`streams-${matchId}`);
  container.innerHTML = '<div style="text-align:center;padding:.5rem;font-size:.8rem;opacity:.6"><i class="fa-solid fa-spinner fa-spin"></i> Buscando streams...</div>';

  try {
    const r = await fetch(`${VPS}/api/football/streams/${matchId}`);
    if (!r.ok) throw new Error(`Error ${r.status}`);
    const byLanguage = await r.json();

    const langs = Object.keys(byLanguage);
    if (!langs.length) {
      container.innerHTML = '<div style="text-align:center;padding:.5rem;font-size:.78rem;opacity:.5">Sin streams activos ahora mismo.</div>';
      return;
    }

    container.innerHTML = '';

    // English y Spanish primero, resto alfabético
    const priority = ['English', 'Spanish', 'Portuguese'];
    langs.sort((a, b) => {
      const ai = priority.indexOf(a), bi = priority.indexOf(b);
      if (ai !== -1 && bi !== -1) return ai - bi;
      if (ai !== -1) return -1;
      if (bi !== -1) return 1;
      return a.localeCompare(b);
    });

    for (const lang of langs) {
      const streams = byLanguage[lang];

      const label = document.createElement('div');
      label.className = 'lang-label';
      label.textContent = `${flag(lang)} ${lang}`;
      container.appendChild(label);

      streams.forEach((s, i) => {
        const btn = document.createElement('button');
        btn.className = 'btn-stream';
        const viewers = s.viewers ? `<span class="badge-viewers">${s.viewers} 👁</span>` : '';
        const quality = s.hd
          ? '<span class="badge-hd">HD</span>'
          : '<span class="badge-sd">SD</span>';
        btn.innerHTML = `<i class="fa-solid fa-play-circle"></i> Stream ${i + 1} ${quality} ${viewers}`;
        btn.addEventListener('click', () => openInProxy(s.embedUrl));
        container.appendChild(btn);
      });
    }

  } catch(e) {
    container.innerHTML = `<div style="text-align:center;padding:.5rem;font-size:.78rem;color:var(--red)">
      <i class="fa-solid fa-triangle-exclamation"></i> ${e.message}
    </div>`;
  }
}

document.getElementById('url-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') openInProxy();
});

loadMatches();
setInterval(loadMatches, 90_000);
</script>
</body>
</html>

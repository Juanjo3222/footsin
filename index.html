<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budsin Football</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/jpeg" href="https://games.budsin.dev/images.jpeg">

    <script src="https://games.budsin.dev/classroom-hotkey.js" defer></script>
    <style>
        :root {
            --bg-main: #0b0c10;
            --bg-card: #1f2833;
            --accent-glow: #00ffcc;
            --accent-blue: #45f3ff;
            --text-light: #c5c6c7;
            --text-white: #ffffff;
            --live-red: #ff3b3b;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-main); color: var(--text-light);
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        header {
            width: 100%; padding: 2rem 0; text-align: center;
            background: linear-gradient(180deg, rgba(69,243,255,0.1) 0%, rgba(0,0,0,0) 100%);
        }

        h1 { margin: 0; font-size: 2.5rem; color: var(--text-white); text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 10px rgba(69, 243, 255, 0.5); }
        h1 span { color: var(--accent-glow); }
        .subtitle { margin-top: 0.5rem; font-size: 0.9rem; color: #66fcf1; opacity: 0.8; }
        .main-container { width: 90%; max-width: 950px; margin-top: 1rem; flex: 1; }

        .day-container { margin-bottom: 3rem; width: 100%; }
        .day-title {
            font-size: 1.5rem; color: var(--text-white); margin-bottom: 1.2rem;
            display: flex; align-items: center; gap: 12px;
            border-bottom: 2px solid rgba(69, 243, 255, 0.2); padding-bottom: 0.5rem;
            text-transform: capitalize;
        }

        .day-title i { color: var(--accent-blue); }
        .day-title.live-header i { color: var(--live-red); animation: pulse-icon 1.5s infinite; }

        @keyframes pulse-icon {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }

        .matches-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 20px; }
        .match-card { 
            background-color: var(--bg-card); border-radius: 12px; padding: 1.5rem; 
            border: 1px solid rgba(255, 255, 255, 0.05); transition: all 0.3s ease; 
            display: flex; flex-direction: column; justify-content: space-between; 
            position: relative; overflow: hidden; 
        }
        
        .match-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(69, 243, 255, 0.1);
            border-color: rgba(69, 243, 255, 0.3);
        }

        .match-card::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background-color: var(--accent-blue); }
        .match-card.is-live-card::before { background-color: var(--live-red); }

        .match-meta {
            display: flex; justify-content: space-between; align-items: center;
            font-size: 0.75rem; color: var(--accent-glow); margin-bottom: 0.5rem; font-weight: bold;
        }

        .match-time { background: rgba(0,0,0,0.3); padding: 2px 6px; border-radius: 4px; color: #fff; }
        .teams-container { display: flex; justify-content: space-around; align-items: center; margin: 1rem 0; }
        .team { display: flex; flex-direction: column; align-items: center; width: 42%; text-align: center; }
        .team img { width: 48px; height: 48px; object-fit: contain; margin-bottom: 0.5rem; background-color: rgba(255, 255, 255, 0.03); border-radius: 50%; padding: 4px; }
        .team-name { font-size: 0.85rem; font-weight: 600; color: var(--text-white); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; }
        .vs { font-size: 0.9rem; font-weight: bold; color: var(--accent-glow); }
        .match-title { font-size: 0.95rem; font-weight: bold; text-align: center; margin-bottom: 0.2rem; color: var(--text-white); }
        
        .stream-selectors { display: flex; flex-direction: column; gap: 8px; margin-top: 1rem; }

        .btn-stream {
            background-color: rgba(69, 243, 255, 0.07); color: var(--text-white);
            border: 1px solid rgba(69, 243, 255, 0.4); padding: 0.6rem; border-radius: 6px;
            font-size: 0.8rem; cursor: pointer; transition: all 0.2s;
            text-align: left; display: flex; justify-content: space-between; align-items: center;
        }

        .btn-stream:hover { background-color: var(--accent-blue); color: var(--bg-main); font-weight: bold; }
        .btn-stream .lang-tag { background: rgba(0,0,0,0.2); padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; color: var(--accent-glow); }
        .btn-stream:hover .lang-tag { color: #000; background: rgba(0,0,0,0.1); }
        
        .badge-hd { font-size: 0.65rem; background: #ffaa00; color: #000; padding: 1px 3px; border-radius: 3px; font-weight: bold; margin-left: 4px; }
        .loading, .no-matches { text-align: center; padding: 3rem; color: var(--text-light); font-size: 1.1rem; width: 100%; box-sizing: border-box; }
        .status-bar { text-align: center; font-size: 0.85rem; color: #45f3ff; padding: 1rem; border-top: 1px solid rgba(255, 255, 255, 0.05); width: 100%; box-sizing: border-box; margin-top: auto;}
        .status-bar .dot { width: 8px; height: 8px; background-color: var(--accent-glow); border-radius: 50%; display: inline-block; box-shadow: 0 0 8px var(--accent-glow); margin-right: 5px; }
    </style>
</head>
<body>

    <header>
        <h1>Budsin <span>Stream Grid</span></h1>
        <div class="subtitle">Infraestructura de Datos: streamed.budsin.dev</div>
    </header>

    <div class="main-container" id="agenda-master-container">
        <div class="loading"><i class="fa-solid fa-circle-notch fa-spin"></i> Sincronizando agenda deportiva y flujos de idiomas...</div>
    </div>

    <div class="status-bar">
        <span><div class="dot"></div> Distribución de vídeo enrutada hacia embed.budsin.dev</span>
    </div>

    <script>
        const STREAM_BASE = 'https://streamed.budsin.dev';
        const EMBED_REPLACE_BASE = 'https://embed.budsin.dev';

        // Reescribe cualquier URL de embed nativa para que corra bajo tu propio subdominio embed.budsin.dev
        function sanitizeEmbedUrl(rawUrl) {
            if (!rawUrl) return '#';
            try {
                const urlObj = new URL(rawUrl);
                // Extrae el path de reproducción (/watch, /player, etc.) junto a sus parámetros de ID
                return EMBED_REPLACE_BASE + urlObj.pathname + urlObj.search;
            } catch (e) {
                // Fallback por si la estructura de la API cambia drásticamente
                return rawUrl.replace(/^https?:\/\/[^\/]+/, EMBED_REPLACE_BASE);
            }
        }

        function getRelativeDayName(timestamp) {
            const matchDate = new Date(timestamp);
            const today = new Date();
            
            const matchDay = new Date(matchDate.getFullYear(), matchDate.getMonth(), matchDate.getDate()).getTime();
            const todayDay = new Date(today.getFullYear(), today.getMonth(), today.getDate()).getTime();
            
            const oneDay = 24 * 60 * 60 * 1000;
            const diff = matchDay - todayDay;

            if (diff === 0) return 'Hoy';
            if (diff === oneDay) return 'Mañana';
            if (diff === -oneDay) return 'Ayer';

            return matchDate.toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'short' });
        }

        async function initDashboard() {
            try {
                if ('serviceWorker' in navigator) {
                    await navigator.serviceWorker.register('./sw.js').catch(()=>{});
                }
                await renderTimeline();
            } catch (e) {
                document.getElementById('agenda-master-container').innerHTML = `<div class="no-matches">Error crítico: ${e.message}</div>`;
            }
        }

        async function renderTimeline() {
            const masterContainer = document.getElementById('agenda-master-container');
            
            try {
                const response = await fetch(`${STREAM_BASE}/api/matches/football`);
                if (!response.ok) throw new Error("Fallo de comunicación con la API de streamed.budsin.dev");
                
                const matches = await response.json();
                masterContainer.innerHTML = '';

                if (!matches || matches.length === 0) {
                    masterContainer.innerHTML = '<div class="no-matches">No hay partidos programados en la base de datos.</div>';
                    return;
                }

                const groups = {};
                matches.forEach(match => {
                    const groupName = getRelativeDayName(match.date);
                    if (!groups[groupName]) groups[groupName] = [];
                    groups[groupName].push(match);
                });

                for (const [dayName, dayMatches] of Object.entries(groups)) {
                    const daySection = document.createElement('div');
                    daySection.className = 'day-container';

                    const isToday = dayName === 'Hoy';
                    daySection.innerHTML = `
                        <div class="day-title ${isToday ? 'live-header' : ''}">
                            <i class="${isToday ? 'fa-solid fa-satellite-dish' : 'fa-solid fa-calendar-day'}"></i>
                            <span>${dayName}</span>
                        </div>
                        <div class="matches-grid" id="grid-${btoa(encodeURIComponent(dayName)).replace(/=/g, '')}"></div>
                    `;

                    masterContainer.appendChild(daySection);
                    const gridContainer = daySection.querySelector('.matches-grid');

                    dayMatches.forEach(match => {
                        const matchCard = document.createElement('div');
                        matchCard.className = `match-card ${isToday ? 'is-live-card' : ''}`;

                        const startTime = new Date(match.date).toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });

                        const homeBadge = match.teams?.home?.badge ? `${STREAM_BASE}/api/images/badge/${match.teams.home.badge}.webp` : 'https://img.icons8.com/ios-filled/50/ffffff/football2.png';
                        const awayBadge = match.teams?.away?.badge ? `${STREAM_BASE}/api/images/badge/${match.teams.away.badge}.webp` : 'https://img.icons8.com/ios-filled/50/ffffff/football2.png';

                        const homeName = match.teams?.home?.name || 'Local';
                        const awayName = match.teams?.away?.name || 'Visitante';

                        matchCard.innerHTML = `
                            <div class="match-meta">
                                <span class="match-time"><i class="fa-regular fa-clock"></i> ${startTime}</span>
                                ${match.popular ? '<span><i class="fa-solid fa-star" style="color:#ffaa00"></i> TOP</span>' : ''}
                            </div>
                            <div class="match-title">${match.title || (homeName + ' vs ' + awayName)}</div>
                            <div class="teams-container">
                                <div class="team">
                                    <img src="${homeBadge}" alt="${homeName}" loading="lazy" onerror="this.src='https://img.icons8.com/ios-filled/50/ffffff/football2.png'">
                                    <div class="team-name">${homeName}</div>
                                </div>
                                <div class="vs">VS</div>
                                <div class="team">
                                    <img src="${awayBadge}" alt="${awayName}" loading="lazy" onerror="this.src='https://img.icons8.com/ios-filled/50/ffffff/football2.png'">
                                    <div class="team-name">${awayName}</div>
                                </div>
                            </div>
                            <div class="stream-selectors" id="streams-${match.id}">
                                <button class="btn-stream" style="text-align:center; justify-content:center; opacity:0.6;" onclick="loadStreamsForMatch('${match.id}', ${JSON.stringify(match.sources).replace(/"/g, '&quot;')})">
                                    <i class="fa-solid fa-headset" style="margin-right:6px"></i> Ver Idiomas Disponibles
                                </button>
                            </div>
                        `;
                        gridContainer.appendChild(matchCard);
                    });
                }

            } catch (err) {
                masterContainer.innerHTML = `<div class="no-matches" style="color: var(--live-red);"><i class="fa-solid fa-triangle-exclamation"></i> Error al mapear la API: ${err.message}</div>`;
            }
        }

        async function loadStreamsForMatch(matchId, sources) {
            const selectorContainer = document.getElementById(`streams-${matchId}`);
            selectorContainer.innerHTML = `<span style="font-size:0.8rem; text-align:center; color:var(--accent-blue)"><i class="fa-solid fa-spinner fa-spin"></i> Escaneando señales...</span>`;

            try {
                if (!sources || sources.length === 0) {
                    selectorContainer.innerHTML = `<span style="font-size:0.8rem; color:var(--live-red)">No hay fuentes para este evento.</span>`;
                    return;
                }

                const sourceConfig = sources[0];
                const res = await fetch(`${STREAM_BASE}/api/stream/${sourceConfig.source}/${sourceConfig.id}`);
                
                if (!res.ok) throw new Error();
                const streams = await res.json();

                selectorContainer.innerHTML = '';

                if (!streams || streams.length === 0) {
                    selectorContainer.innerHTML = `<span style="font-size:0.8rem; color:var(--text-light)">Canales offline por el momento.</span>`;
                    return;
                }

                streams.forEach(stream => {
                    const btn = document.createElement('button');
                    btn.className = 'btn-stream';
                    
                    // Aplicación del filtro interceptor para forzar embed.budsin.dev
                    const personalEmbedUrl = sanitizeEmbedUrl(stream.embedUrl);
                    btn.onclick = () => { window.location.href = personalEmbedUrl; };
                    
                    const hdLabel = stream.hd ? `<span class="badge-hd">HD</span>` : '';
                    
                    btn.innerHTML = `
                        <span><i class="fa-solid fa-play" style="font-size:0.7rem; margin-right:6px; color:var(--accent-blue)"></i> Opción ${stream.streamNo} ${hdLabel}</span>
                        <span class="lang-tag"><i class="fa-solid fa-globe"></i> ${stream.language || 'Alternativo'}</span>
                    `;
                    selectorContainer.appendChild(btn);
                });

            } catch (e) {
                selectorContainer.innerHTML = `<span style="font-size:0.8rem; color:var(--live-red)">Error al enlazar idiomas remotos.</span>`;
            }
        }

        window.addEventListener('DOMContentLoaded', initDashboard);
    </script>
</body>
</html>

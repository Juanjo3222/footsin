<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartelera — Budsin Football</title>
    <link rel="icon" type="image/jpeg" href="https://games.budsin.dev/images.jpeg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700;800&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://games.budsin.dev/classroom-hotkey.js" defer></script>
    <style>
        :root {
            --bg-main: #0e0d0b;
            --bg-card: #17150f;
            --bg-card-raised: #1d1b14;
            --line: #2d2a22;
            --paper: #ede9e0;
            --paper-dim: #948e7c;
            --pitch: #4a6b4a;
            --pitch-dim: #2e3f2e;
            --card-yellow: #e8c547;
            --card-red: #b23a2e;
            --font-display: 'Barlow Condensed', sans-serif;
            --font-serif: 'Source Serif 4', serif;
            --font-mono: 'IBM Plex Mono', monospace;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0; padding: 0;
            font-family: var(--font-serif);
            background-color: var(--bg-main);
            background-image:
                repeating-linear-gradient(0deg, rgba(255,255,255,0.012) 0px, rgba(255,255,255,0.012) 1px, transparent 1px, transparent 36px);
            color: var(--paper);
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        header {
            width: 100%;
            padding: 2.8rem 0 1.6rem;
            text-align: center;
            border-bottom: 1px solid var(--line);
        }

        .masthead-row {
            display: flex; align-items: baseline; justify-content: center; gap: 0.9rem;
        }

        h1 {
            margin: 0;
            font-family: var(--font-display);
            font-weight: 800;
            font-size: 3.2rem;
            color: var(--paper);
            text-transform: uppercase;
            letter-spacing: 1px;
            line-height: 1;
        }
        h1 .accent { color: var(--card-yellow); }

        .edition-tag {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            color: var(--pitch);
            border: 1px solid var(--pitch-dim);
            padding: 3px 8px;
            border-radius: 2px;
            text-transform: uppercase;
            letter-spacing: 1px;
            align-self: center;
            white-space: nowrap;
        }

        .subtitle {
            margin-top: 0.6rem;
            font-family: var(--font-mono);
            font-size: 0.78rem;
            color: var(--paper-dim);
            letter-spacing: 0.5px;
        }

        .main-container { width: 92%; max-width: 980px; margin-top: 0; }

        /* Reproductor */
        .player-container {
            width: 100%;
            display: none;
            margin: 2.4rem 0 2.8rem;
            background: #000;
            border-radius: 2px;
            overflow: hidden;
            border: 1px solid var(--line);
            position: relative;
            aspect-ratio: 16 / 9;
        }
        .close-player-btn {
            position: absolute; top: 10px; right: 10px;
            background: rgba(14,13,11,0.85);
            color: var(--paper);
            border: 1px solid var(--card-red);
            padding: 5px 11px;
            border-radius: 2px;
            cursor: pointer;
            font-family: var(--font-mono);
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            z-index: 20;
        }
        .close-player-btn:hover { background: var(--card-red); }

        /* Secciones de día */
        .day-container { margin-top: 2.6rem; width: 100%; }
        .day-container:first-of-type { margin-top: 2.2rem; }

        .day-title {
            display: flex; align-items: baseline; gap: 0.7rem;
            margin-bottom: 1.1rem;
        }
        .day-title .day-name {
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--paper);
        }
        .day-title .day-rule { flex: 1; height: 1px; background: var(--line); }
        .day-title .day-count {
            font-family: var(--font-mono);
            font-size: 0.72rem;
            color: var(--paper-dim);
        }
        .day-title.live-header .day-name::before {
            content: '';
            display: inline-block;
            width: 8px; height: 8px;
            background: var(--card-red);
            border-radius: 50%;
            margin-right: 9px;
            vertical-align: middle;
        }

        /* Fila destacada (TOP del día) */
        .featured-row {
            display: grid;
            grid-template-columns: 64px 1fr auto;
            align-items: center;
            gap: 1.2rem;
            background: var(--bg-card-raised);
            border: 1px solid var(--line);
            border-left: 3px solid var(--card-yellow);
            padding: 1.1rem 1.3rem;
            margin-bottom: 0.6rem;
        }

        /* Lista de partidos normales */
        .matches-list { display: flex; flex-direction: column; gap: 0.5rem; }

        .match-row {
            display: grid;
            grid-template-columns: 64px 1fr auto;
            align-items: center;
            gap: 1.2rem;
            background: var(--bg-card);
            border: 1px solid var(--line);
            border-left: 3px solid var(--pitch-dim);
            padding: 0.85rem 1.3rem;
            transition: border-color 0.15s ease, background-color 0.15s ease;
        }
        .match-row:hover, .featured-row:hover {
            background: var(--bg-card-raised);
            border-left-color: var(--pitch);
        }
        .match-row.is-live, .featured-row.is-live { border-left-color: var(--card-red); }

        .match-time-block {
            font-family: var(--font-mono);
            text-align: center;
            color: var(--paper-dim);
            line-height: 1.1;
        }
        .match-time-block .time { font-size: 1.0rem; color: var(--paper); display: block; }
        .match-time-block .live-tag {
            font-size: 0.62rem;
            color: var(--card-red);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .match-info { min-width: 0; }
        .match-title {
            font-family: var(--font-serif);
            font-weight: 600;
            font-size: 1.0rem;
            color: var(--paper);
            margin: 0 0 0.3rem;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .featured-row .match-title { font-size: 1.2rem; }

        .teams-line {
            display: flex; align-items: center; gap: 0.55rem;
            font-family: var(--font-mono);
            font-size: 0.74rem;
            color: var(--paper-dim);
        }
        .teams-line img {
            width: 20px; height: 20px; object-fit: contain;
            filter: grayscale(1) brightness(1.6);
            opacity: 0.75;
            transition: filter 0.15s ease, opacity 0.15s ease;
        }
        .match-row:hover .teams-line img, .featured-row:hover .teams-line img {
            filter: none; opacity: 1;
        }
        .teams-line .vs-sep { color: var(--card-yellow); font-size: 0.65rem; }

        .top-flag {
            font-family: var(--font-mono);
            font-size: 0.62rem;
            color: var(--bg-main);
            background: var(--card-yellow);
            padding: 1px 6px;
            margin-left: 0.5rem;
            letter-spacing: 0.5px;
            vertical-align: middle;
        }

        /* Selector de idiomas / streams */
        .stream-selectors {
            display: flex; flex-wrap: wrap; gap: 0.4rem; justify-content: flex-end; max-width: 280px;
        }

        .btn-open-streams {
            background: transparent;
            color: var(--pitch);
            border: 1px solid var(--pitch-dim);
            padding: 0.5rem 0.85rem;
            border-radius: 2px;
            font-family: var(--font-mono);
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.15s ease;
            white-space: nowrap;
        }
        .btn-open-streams:hover { background: var(--pitch); color: var(--bg-main); border-color: var(--pitch); }

        .btn-stream {
            background: transparent;
            color: var(--paper);
            border: 1px solid var(--line);
            padding: 0.4rem 0.65rem;
            border-radius: 2px;
            font-family: var(--font-mono);
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.15s ease;
            display: inline-flex; align-items: center; gap: 6px;
        }
        .btn-stream:hover { border-color: var(--card-yellow); color: var(--card-yellow); }
        .btn-stream .lang-tag { color: var(--paper-dim); }
        .btn-stream:hover .lang-tag { color: var(--card-yellow); }
        .btn-stream .hd-mark { color: var(--card-red); font-size: 0.62rem; }

        .stream-status {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            color: var(--paper-dim);
        }

        .loading, .no-matches {
            text-align: center; padding: 4rem 1rem; color: var(--paper-dim);
            font-family: var(--font-mono); font-size: 0.85rem; width: 100%; box-sizing: border-box;
        }

        .status-bar {
            text-align: center;
            font-family: var(--font-mono);
            font-size: 0.7rem;
            color: var(--paper-dim);
            padding: 1.4rem;
            border-top: 1px solid var(--line);
            width: 100%; box-sizing: border-box; margin-top: 3.5rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .status-bar .dot {
            width: 6px; height: 6px; background-color: var(--pitch); border-radius: 50%;
            display: inline-block; margin-right: 6px;
        }

        @media (max-width: 640px) {
            h1 { font-size: 2.2rem; }
            .masthead-row { flex-direction: column; gap: 0.4rem; }
            .match-row, .featured-row {
                grid-template-columns: 1fr; gap: 0.6rem; text-align: left;
            }
            .match-time-block { text-align: left; }
            .stream-selectors { justify-content: flex-start; max-width: none; }
        }

        @media (prefers-reduced-motion: reduce) {
            * { transition: none !important; }
        }
    </style>
</head>
<body>

    <script>
        if (window.top !== window.self) {
            window.top.location = window.self.location;
        }
    </script>

    <header>
        <div class="masthead-row">
            <h1>Budsin<span class="accent">FC</span></h1>
            <span class="edition-tag">Edición en vivo</span>
        </div>
        <div class="subtitle">streamed.budsin.dev — cartelera de transmisiones</div>
    </header>

    <div class="main-container">
        <div id="video-player-zone" class="player-container">
            <button class="close-player-btn" onclick="closeVideoPlayer()">Cerrar</button>
            <video id="live-video" controls autoplay playsinline style="width: 100%; height: 100%; object-fit: contain;"></video>
        </div>

        <div id="agenda-master-container">
            <div class="loading">Sincronizando agenda y señales disponibles…</div>
        </div>
    </div>

    <div class="status-bar">
        <span><span class="dot"></span>Vídeo directo desde el origen HLS</span>
    </div>

    <script>
        const STREAM_BASE = 'https://streamed.budsin.dev';
        let hlsInstance = null; 

        function sanitizeEmbedUrl(rawUrl) {
            return rawUrl || '#';
        }

        // ==========================================
        // ESCUDO DE INTERCEPTACIÓN Y CONTROL DE FOCO
        // ==========================================
        (function() {
            const originalOpen = window.open;
            window.open = function(url, name, specs) {
                console.warn("Budsin Shield: Bloqueado script de ventana externa ->", url);
                return null;
            };

            window.addEventListener('click', function(e) {
                window.open = function() { return null; };
                setTimeout(() => { window.open = originalOpen; }, 800);
            }, true);

            setInterval(function() {
                if (document.activeElement === document.getElementById('live-video')) {
                    window.focus();
                }
            }, 400);

            window.addEventListener('blur', function() {
                setTimeout(() => { window.focus(); }, 100);
            });
        })();

        // ==========================================
        // CONTROLADORES DEL REPRODUCTOR DIRECTO (.m3u8)
        // ==========================================
        async function openVideoStream(embedUrl, streamNo) {
            const playerZone = document.getElementById('video-player-zone');
            const video = document.getElementById('live-video');

            playerZone.style.display = 'block';
            playerZone.scrollIntoView({ behavior: 'smooth', block: 'start' });

            if (hlsInstance) {
                hlsInstance.destroy();
                hlsInstance = null;
            }

            let finalM3u8Url = embedUrl;

            // INTERCEPTOR OPTIMIZADO PARA APIS DE STREAMING (embed.st / streamed.pk)
            if (embedUrl.includes('embed.st') || embedUrl.includes('streamed.pk')) {
                try {
                    let source = '';
                    let matchId = '';
                    
                    // Extraer los componentes limpios desde la estructura de la URL del iframe
                    // Ejemplo esperado: https://embed.st/embed/admin/ppv-ecuador-vs-germany/9
                    if (embedUrl.includes('/embed/')) {
                        const pathParts = embedUrl.split('/embed/')[1]?.split('?')[0].split('/');
                        if (pathParts && pathParts.length >= 2) {
                            source = pathParts[0];   // "admin"
                            matchId = pathParts[1];  // "ppv-ecuador-vs-germany"
                        }
                    }

                    if (source && matchId) {
                        // Llamada limpia directo al JSON del stream evitando errores de segmentación por números de canal al final
                        const res = await fetch(`https://streamed.pk/api/stream/${source}/${matchId}`);
                        if (res.ok) {
                            const streams = await res.json();
                            // Buscamos dinámicamente el stream que corresponda al streamNo seleccionado en el botón
                            const targetStream = streams.find(s => s.streamNo === parseInt(streamNo)) || streams[0];
                            
                            if (targetStream && targetStream.embedUrl) {
                                // Si devuelve directamente un .m3u8, lo usamos, de lo contrario consultamos su endpoint nativo source
                                if (targetStream.embedUrl.includes('.m3u8')) {
                                    finalM3u8Url = targetStream.embedUrl;
                                } else {
                                    // Fallback tradicional POST /api/source en caso de requerir token hash
                                    let videoId = targetStream.embedUrl.split('/embed/')[1]?.split('?')[0] || targetStream.embedUrl.split('/e/')[1]?.split('?')[0];
                                    if (videoId) {
                                        const sourceRes = await fetch(`https://embed.st/api/source/${videoId}`, {
                                            method: 'POST',
                                            headers: { 'Content-Type': 'application/json' },
                                            body: JSON.stringify({ id: videoId, streamNo: String(streamNo || 1) })
                                        });
                                        const sourceJson = await sourceRes.json();
                                        if (sourceJson && sourceJson.url) finalM3u8Url = sourceJson.url;
                                    }
                                }
                            }
                        }
                    }
                } catch (err) {
                    console.error("Error al procesar la API limpia de flujos HLS:", err);
                }
            }

            // Inicialización de flujos de reproducción nativos / Hls.js
            if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = finalM3u8Url;
                video.addEventListener('loadedmetadata', () => {
                    video.play().catch(err => console.log("Autoplay nativo bloqueado:", err));
                });
            } 
            else if (Hls.isSupported()) {
                hlsInstance = new Hls();
                hlsInstance.loadSource(finalM3u8Url);
                hlsInstance.attachMedia(video);
                
                hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
                    video.play().catch(err => console.log("Autoplay Hls.js bloqueado:", err));
                });

                hlsInstance.on(Hls.Events.ERROR, function (event, data) {
                    if (data.fatal) {
                        switch (data.type) {
                            case Hls.ErrorTypes.NETWORK_ERROR:
                                hlsInstance.startLoad();
                                break;
                            case Hls.ErrorTypes.MEDIA_ERROR:
                                hlsInstance.recoverMediaError();
                                break;
                            default:
                                closeVideoPlayer();
                                break;
                        }
                    }
                });
            } else {
                alert("Navegador no compatible con transmisiones HLS directas.");
            }
        }

        function closeVideoPlayer() {
            const playerZone = document.getElementById('video-player-zone');
            const video = document.getElementById('live-video');
            
            if (hlsInstance) {
                hlsInstance.destroy();
                hlsInstance = null;
            }
            
            video.src = '';
            video.load(); 
            playerZone.style.display = 'none';
        }

        function getRelativeDayName(timestamp) {
            const matchDate = new Date(timestamp);
            const today = new Date();

            const matchDay = new Date(matchDate.getFullYear(), matchDate.getMonth(), matchDate.getDate()).getTime();
            const todayDay = new Date(today.getFullYear(), today.getMonth(), today.getDate()).getTime();

            const oneDay = 24 * 60 * 60 * 1000;
            const diff = matchDay - todayDay;

            if (diff === 0) return 'Hoy';
            if (diff === oneDay) return 'Mañana';
            if (diff === -oneDay) return 'Ayer';

            return matchDate.toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'short' });
        }

        async function initDashboard() {
            try {
                if ('serviceWorker' in navigator) {
                    await navigator.serviceWorker.register('./sw.js').catch(()=>{});
                }
                await renderTimeline();
            } catch (e) {
                document.getElementById('agenda-master-container').innerHTML = `<div class="no-matches">Error crítico: ${e.message}</div>`;
            }
        }

        function buildMatchRowHTML(match, isToday, isFeatured) {
            const startTime = new Date(match.date).toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });

            const homeBadge = match.teams?.home?.badge ? `${STREAM_BASE}/api/images/badge/${match.teams.home.badge}.webp` : 'https://img.icons8.com/ios-filled/50/ffffff/football2.png';
            const awayBadge = match.teams?.away?.badge ? `${STREAM_BASE}/api/images/badge/${match.teams.away.badge}.webp` : 'https://img.icons8.com/ios-filled/50/ffffff/football2.png';

            const homeName = match.teams?.home?.name || 'Local';
            const awayName = match.teams?.away?.name || 'Visitante';

            const rowClass = isFeatured
                ? `featured-row ${isToday ? 'is-live' : ''}`
                : `match-row ${isToday ? 'is-live' : ''}`;

            return `
                <div class="${rowClass}">
                    <div class="match-time-block">
                        <span class="time">${startTime}</span>
                        ${isToday ? '<span class="live-tag">En vivo</span>' : ''}
                    </div>
                    <div class="match-info">
                        <p class="match-title">${match.title || (homeName + ' vs ' + awayName)}${match.popular ? '<span class="top-flag">TOP</span>' : ''}</p>
                        <div class="teams-line">
                            <img src="${homeBadge}" alt="${homeName}" loading="lazy" onerror="this.src='https://img.icons8.com/ios-filled/50/ffffff/football2.png'">
                            <span>${homeName}</span>
                            <span class="vs-sep">vs</span>
                            <img src="${awayBadge}" alt="${awayName}" loading="lazy" onerror="this.src='https://img.icons8.com/ios-filled/50/ffffff/football2.png'">
                            <span>${awayName}</span>
                        </div>
                    </div>
                    <div class="stream-selectors" id="streams-${match.id}">
                        <button class="btn-open-streams" onclick="loadStreamsForMatch('${match.id}', ${JSON.stringify(match.sources).replace(/"/g, '&quot;')})">
                            Ver señales
                        </button>
                    </div>
                </div>
            `;
        }

        async function renderTimeline() {
            const masterContainer = document.getElementById('agenda-master-container');

            try {
                const response = await fetch(`${STREAM_BASE}/api/matches/football`);
                if (!response.ok) throw new Error("Fallo de comunicación con la API de streamed.budsin.dev");

                const matches = await response.json();
                masterContainer.innerHTML = '';

                if (!matches || matches.length === 0) {
                    masterContainer.innerHTML = '<div class="no-matches">No hay partidos programados en la base de datos.</div>';
                    return;
                }

                const groups = {};
                matches.forEach(match => {
                    const groupName = getRelativeDayName(match.date);
                    if (!groups[groupName]) groups[groupName] = [];
                    groups[groupName].push(match);
                });

                for (const [dayName, dayMatches] of Object.entries(groups)) {
                    const daySection = document.createElement('div');
                    daySection.className = 'day-container';

                    const isToday = dayName === 'Hoy';

                    const sorted = [...dayMatches];
                    const featuredIndex = sorted.findIndex(m => m.popular);
                    let featured = null;
                    if (featuredIndex !== -1) {
                        featured = sorted.splice(featuredIndex, 1)[0];
                    }

                    daySection.innerHTML = `
                        <div class="day-title ${isToday ? 'live-header' : ''}">
                            <span class="day-name">${dayName}</span>
                            <span class="day-rule"></span>
                            <span class="day-count">${dayMatches.length} ${dayMatches.length === 1 ? 'partido' : 'partidos'}</span>
                        </div>
                        ${featured ? buildMatchRowHTML(featured, isToday, true) : ''}
                        <div class="matches-list"></div>
                    `;

                    masterContainer.appendChild(daySection);
                    const listContainer = daySection.querySelector('.matches-list');
                    listContainer.innerHTML = sorted.map(m => buildMatchRowHTML(m, isToday, false)).join('');
                }

            } catch (err) {
                masterContainer.innerHTML = `<div class="no-matches" style="color: var(--card-red);">Error al mapear la API: ${err.message}</div>`;
            }
        }

        async function loadStreamsForMatch(matchId, sources) {
            const selectorContainer = document.getElementById(`streams-${matchId}`);
            selectorContainer.innerHTML = `<span class="stream-status">Escaneando señales…</span>`;

            try {
                if (!sources || sources.length === 0) {
                    selectorContainer.innerHTML = `<span class="stream-status" style="color: var(--card-red);">No hay fuentes para este evento.</span>`;
                    return;
                }

                const sourceConfig = sources[0];
                const res = await fetch(`${STREAM_BASE}/api/stream/${sourceConfig.source}/${sourceConfig.id}`);

                if (!res.ok) throw new Error();
                const streams = await res.json();

                selectorContainer.innerHTML = '';

                if (!streams || streams.length === 0) {
                    selectorContainer.innerHTML = `<span class="stream-status">Canales offline por el momento.</span>`;
                    return;
                }

                streams.forEach(stream => {
                    const btn = document.createElement('button');
                    btn.className = 'btn-stream';

                    const personalEmbedUrl = sanitizeEmbedUrl(stream.embedUrl);
                    btn.onclick = () => { openVideoStream(personalEmbedUrl, stream.streamNo); };

                    const hdLabel = stream.hd ? `<span class="hd-mark">HD</span>` : '';

                    btn.innerHTML = `
                        <span>Opción ${stream.streamNo}</span>${hdLabel}
                        <span class="lang-tag">${stream.language || 'Alternativo'}</span>
                    `;
                    selectorContainer.appendChild(btn);
                });

            } catch (e) {
                selectorContainer.innerHTML = `<span class="stream-status" style="color: var(--card-red);">Error al enlazar idiomas remotos.</span>`;
            }
        }

        window.addEventListener('DOMContentLoaded', initDashboard);
    </script>
</body>
</html>

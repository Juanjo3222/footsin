<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budsin Football</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
  --bg: #0b0c10;
  --card: #1a1d24;
  --card-border: rgba(255,255,255,.06);
  --accent: #00ffcc;
  --blue: #45f3ff;
  --muted: #8b9199;
  --white: #f0f2f5;
  --red: #ff3b3b;
  --radius: 10px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--muted);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── Header ── */
header {
  padding: 2rem 1rem 1.5rem;
  text-align: center;
  background: linear-gradient(180deg, rgba(69,243,255,.06) 0%, transparent 100%);
  border-bottom: 1px solid rgba(255,255,255,.04);
}

h1 {
  font-size: 1.9rem;
  font-weight: 800;
  color: var(--white);
  text-transform: uppercase;
  letter-spacing: 4px;
}

h1 span { color: var(--accent); }

.sub {
  font-size: .78rem;
  color: var(--blue);
  margin-top: .4rem;
  opacity: .7;
  letter-spacing: .04em;
}

/* ── Main ── */
main {
  max-width: 1000px;
  margin: 0 auto;
  padding: 1.4rem 1.5rem 3rem;
  width: 100%;
  flex: 1;
}

/* ── Search bar ── */
.search {
  background: var(--card);
  border-radius: var(--radius);
  padding: .9rem 1rem;
  margin-bottom: 1.5rem;
  border: 1px solid var(--card-border);
}

.search-inner {
  display: flex;
  gap: 8px;
  background: rgba(0,0,0,.35);
  border-radius: 7px;
  border: 1px solid rgba(69,243,255,.25);
  transition: border-color .2s;
}

.search-inner:focus-within { border-color: var(--blue); }

.search-inner input {
  flex: 1;
  background: none;
  border: none;
  outline: none;
  color: var(--white);
  font-size: .92rem;
  padding: .6rem .85rem;
}

.search-inner input::placeholder { color: rgba(255,255,255,.2); }

.search-inner button {
  background: var(--blue);
  color: #0b0c10;
  border: none;
  padding: 0 1.2rem;
  border-radius: 6px;
  font-weight: 700;
  cursor: pointer;
  font-size: .85rem;
  white-space: nowrap;
  transition: background .2s;
}

.search-inner button:hover { background: var(--accent); }

/* ── Section header ── */
.sec-head {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 1rem;
  color: var(--white);
  font-size: .95rem;
  font-weight: 600;
}

.pulse {
  width: 9px;
  height: 9px;
  border-radius: 50%;
  background: var(--red);
  flex-shrink: 0;
  animation: pulse 1.5s infinite;
}

@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(255,59,59,.7); }
  70%       { box-shadow: 0 0 0 8px rgba(255,59,59,0); }
}

/* ── Match grid ── */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(265px, 1fr));
  gap: 14px;
}

.card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 1.1rem 1rem;
  border: 1px solid var(--card-border);
  border-left: 3px solid var(--blue);
  display: flex;
  flex-direction: column;
  gap: .7rem;
  transition: border-color .2s, transform .15s;
}

.card:hover { border-left-color: var(--accent); transform: translateY(-1px); }

.match-title {
  font-size: .82rem;
  font-weight: 600;
  color: var(--white);
  text-align: center;
  line-height: 1.35;
}

.teams {
  display: flex;
  justify-content: space-around;
  align-items: center;
}

.team {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 42%;
  gap: 5px;
}

.team img {
  width: 38px;
  height: 38px;
  object-fit: contain;
  border-radius: 50%;
  background: rgba(255,255,255,.04);
  padding: 3px;
}

.team-name {
  font-size: .7rem;
  font-weight: 600;
  color: var(--white);
  text-align: center;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  width: 100%;
}

.vs {
  font-size: .78rem;
  font-weight: 800;
  color: var(--accent);
}

/* ── Stream buttons ── */
.streams { display: flex; flex-direction: column; gap: 5px; }

.btn-load {
  background: rgba(0,255,204,.06);
  color: var(--accent);
  border: 1px solid rgba(0,255,204,.25);
  padding: .45rem;
  border-radius: 6px;
  font-size: .76rem;
  font-weight: 700;
  cursor: pointer;
  transition: all .2s;
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}

.btn-load:hover { background: var(--accent); color: #0b0c10; }

.btn-stream {
  background: rgba(69,243,255,.06);
  color: var(--blue);
  border: 1px solid rgba(69,243,255,.2);
  padding: .42rem .6rem;
  border-radius: 6px;
  font-size: .74rem;
  font-weight: 700;
  cursor: pointer;
  transition: all .2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
  width: 100%;
}

.btn-stream:hover { background: var(--blue); color: #0b0c10; border-color: var(--blue); }
.btn-stream:disabled { opacity: .45; cursor: wait; }

.lang-label {
  font-size: .65rem;
  opacity: .45;
  text-transform: uppercase;
  letter-spacing: .08em;
  margin: .3rem 0 .15rem;
}

.badge-hd {
  font-size: .58rem;
  background: var(--accent);
  color: #0b0c10;
  border-radius: 3px;
  padding: 1px 4px;
  font-weight: 800;
}

.badge-sd {
  font-size: .58rem;
  background: rgba(255,255,255,.08);
  color: var(--muted);
  border-radius: 3px;
  padding: 1px 4px;
}

.badge-viewers {
  font-size: .62rem;
  opacity: .55;
  margin-left: 2px;
}

/* ── Info / error states ── */
.info {
  text-align: center;
  padding: 2.5rem;
  color: var(--muted);
  grid-column: 1 / -1;
  font-size: .88rem;
}

.err { color: var(--red); }

/* ── Player modal ── */
#player-modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.96);
  z-index: 9999;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
}

#player-modal.show { display: flex; }

#player-modal iframe {
  width: min(960px, 96vw);
  height: min(540px, 54vw);
  border: none;
  border-radius: 8px;
  background: #000;
}

.player-bar {
  display: flex;
  align-items: center;
  gap: 12px;
}

#player-title {
  font-size: .82rem;
  color: var(--muted);
  max-width: 400px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

#close-player {
  background: rgba(255,255,255,.08);
  color: var(--white);
  border: 1px solid rgba(255,255,255,.15);
  padding: .45rem 1.2rem;
  border-radius: 6px;
  cursor: pointer;
  font-size: .82rem;
  transition: background .2s;
}

#close-player:hover { background: rgba(255,255,255,.16); }

/* ── Footer ── */
footer {
  text-align: center;
  padding: .8rem;
  font-size: .72rem;
  color: rgba(69,243,255,.45);
  border-top: 1px solid rgba(255,255,255,.04);
}

.dot-s {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--accent);
  display: inline-block;
  box-shadow: 0 0 5px var(--accent);
  margin-right: 5px;
  vertical-align: middle;
}

/* ── Responsive ── */
@media (max-width: 500px) {
  h1 { font-size: 1.4rem; }
  #player-modal iframe { height: 56vw; }
}
</style>
</head>
<body>

<header>
  <h1>Budsin <span>Football</span></h1>
  <div class="sub">Partidos en vivo · proxy.budsin.dev</div>
</header>

<main>
  <div class="search">
    <div class="search-inner">
      <input id="url-input" type="text" placeholder="Pegar URL de partido externo...">
      <button onclick="openEmbed()"><i class="fa-solid fa-play"></i> Abrir</button>
    </div>
  </div>

  <div class="sec-head">
    <div class="pulse"></div>
    Partidos en vivo · Fútbol
  </div>

  <div class="grid" id="matches">
    <div class="info"><i class="fa-solid fa-spinner fa-spin"></i> Cargando partidos...</div>
  </div>
</main>

<!-- Modal reproductor -->
<div id="player-modal">
  <iframe id="stream-frame"
    allowfullscreen
    allow="autoplay; fullscreen; encrypted-media; picture-in-picture">
  </iframe>
  <div class="player-bar">
    <span id="player-title"></span>
    <button id="close-player" onclick="closePlayer()">
      <i class="fa-solid fa-xmark"></i> Cerrar
    </button>
  </div>
</div>

<footer><span class="dot-s"></span>Conexión cifrada · proxy.budsin.dev</footer>

<script>
const VPS = 'https://proxy.budsin.dev';

const LANG_FLAGS = {
  'English': '🇬🇧', 'Spanish': '🇪🇸', 'Portuguese': '🇵🇹',
  'French': '🇫🇷', 'German': '🇩🇪', 'Italian': '🇮🇹',
  'Arabic': '🇸🇦', 'Turkish': '🇹🇷', 'Dutch': '🇳🇱',
  'Russian': '🇷🇺', 'Romanian': '🇷🇴', 'Polish': '🇵🇱',
};

function flag(lang) { return LANG_FLAGS[lang] || '🌐'; }

// ── Reproductor ───────────────────────────────────────────────

function openEmbed(url, title) {
  const target = url || document.getElementById('url-input').value.trim();
  if (!target) return;
  const full = /^https?:\/\//i.test(target) ? target : 'https://' + target;
  const proxyUrl = `${VPS}/api/football/embed?url=${encodeURIComponent(full)}`;

  const frame = document.getElementById('stream-frame');
  const modal = document.getElementById('player-modal');
  const titleEl = document.getElementById('player-title');

  frame.src = proxyUrl;
  titleEl.textContent = title || full;
  modal.classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closePlayer() {
  document.getElementById('player-modal').classList.remove('show');
  document.getElementById('stream-frame').src = '';
  document.getElementById('player-title').textContent = '';
  document.body.style.overflow = '';
}

// Cerrar con Escape
document.addEventListener('keydown', e => { if (e.key === 'Escape') closePlayer(); });

// Cerrar clickando fuera del iframe
document.getElementById('player-modal').addEventListener('click', function(e) {
  if (e.target === this) closePlayer();
});

// ── Carga de partidos ─────────────────────────────────────────

async function loadMatches() {
  const grid = document.getElementById('matches');
  try {
    const r = await fetch(`${VPS}/api/football/matches`);
    if (!r.ok) throw new Error(`Error ${r.status} — ¿Están los endpoints en el VPS?`);
    const matches = await r.json();

    if (!Array.isArray(matches) || !matches.length) {
      grid.innerHTML = '<div class="info">No hay partidos en vivo ahora mismo. Vuelve más tarde.</div>';
      return;
    }

    grid.innerHTML = '';
    matches.forEach(m => renderCard(grid, m));

  } catch(e) {
    grid.innerHTML = `<div class="info err">
      <i class="fa-solid fa-triangle-exclamation"></i> ${e.message}
    </div>`;
  }
}

function renderCard(grid, m) {
  const home = m.teams?.home;
  const away = m.teams?.away;
  const homeBadge = home?.badge ? `${VPS}/api/football/badge/${home.badge}` : '';
  const awayBadge = away?.badge ? `${VPS}/api/football/badge/${away.badge}` : '';

  const card = document.createElement('div');
  card.className = 'card';

  card.innerHTML = `
    <div class="match-title">${m.title}</div>
    <div class="teams">
      <div class="team">
        ${homeBadge ? `<img src="${homeBadge}" loading="lazy" onerror="this.style.display='none'" alt="${home?.name || ''}">` : ''}
        <div class="team-name">${home?.name || 'Local'}</div>
      </div>
      <div class="vs">VS</div>
      <div class="team">
        ${awayBadge ? `<img src="${awayBadge}" loading="lazy" onerror="this.style.display='none'" alt="${away?.name || ''}">` : ''}
        <div class="team-name">${away?.name || 'Visitante'}</div>
      </div>
    </div>
    <div class="streams" id="streams-${m.id}">
      <button class="btn-load" onclick="loadStreams('${m.id}', '${(m.title || '').replace(/'/g, "\\'")}', this)">
        <i class="fa-solid fa-satellite-dish"></i> Ver streams disponibles
      </button>
    </div>`;

  grid.appendChild(card);
}

// ── Carga de streams por partido ──────────────────────────────

async function loadStreams(matchId, matchTitle, btn) {
  const container = document.getElementById(`streams-${matchId}`);
  container.innerHTML = `<div style="text-align:center;padding:.5rem;font-size:.78rem;opacity:.5">
    <i class="fa-solid fa-spinner fa-spin"></i> Buscando streams...
  </div>`;

  try {
    const r = await fetch(`${VPS}/api/football/streams/${matchId}`);
    if (!r.ok) throw new Error(`Error ${r.status}`);
    const byLanguage = await r.json();

    const langs = Object.keys(byLanguage);
    if (!langs.length) {
      container.innerHTML = `<div style="text-align:center;padding:.5rem;font-size:.75rem;opacity:.45">
        Sin streams activos ahora mismo.
      </div>`;
      return;
    }

    container.innerHTML = '';

    // English y Spanish primero, resto alfabético
    const order = ['English', 'Spanish', 'Portuguese'];
    langs.sort((a, b) => {
      const ai = order.indexOf(a), bi = order.indexOf(b);
      if (ai !== -1 && bi !== -1) return ai - bi;
      if (ai !== -1) return -1;
      if (bi !== -1) return 1;
      return a.localeCompare(b);
    });

    for (const lang of langs) {
      const streams = byLanguage[lang];

      const label = document.createElement('div');
      label.className = 'lang-label';
      label.textContent = `${flag(lang)} ${lang}`;
      container.appendChild(label);

      streams.forEach((s, i) => {
        const btn = document.createElement('button');
        btn.className = 'btn-stream';

        const hdBadge = s.hd
          ? '<span class="badge-hd">HD</span>'
          : '<span class="badge-sd">SD</span>';

        const viewers = s.viewers
          ? `<span class="badge-viewers">${s.viewers} 👁</span>`
          : '';

        btn.innerHTML = `<i class="fa-solid fa-play-circle"></i> Stream ${i + 1} ${hdBadge} ${viewers}`;

        btn.addEventListener('click', () => {
          openEmbed(s.embedUrl, `${matchTitle} — ${flag(lang)} ${lang} Stream ${i + 1}`);
        });

        container.appendChild(btn);
      });
    }

  } catch(e) {
    container.innerHTML = `<div style="text-align:center;padding:.5rem;font-size:.75rem;color:var(--red)">
      Error: ${e.message}
    </div>`;
  }
}

// ── Enter en buscador ─────────────────────────────────────────
document.getElementById('url-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') openEmbed();
});

// ── Init ──────────────────────────────────────────────────────
loadMatches();
setInterval(loadMatches, 90_000);
</script>
</body>
</html>

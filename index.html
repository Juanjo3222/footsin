<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budsin Football v4 - Scramjet Native</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-main: #0b0c10;
            --bg-card: #1f2833;
            --accent-glow: #00ffcc;
            --accent-blue: #45f3ff;
            --text-light: #c5c6c7;
            --text-white: #ffffff;
            --live-red: #ff3b3b;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-light);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            padding: 2rem 0;
            text-align: center;
            background: linear-gradient(180deg, rgba(69,243,255,0.1) 0%, rgba(0,0,0,0) 100%);
        }

        h1 {
            margin: 0;
            font-size: 2.5rem;
            color: var(--text-white);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(69, 243, 255, 0.5);
        }

        h1 span { color: var(--accent-glow); }
        .subtitle { margin-top: 0.5rem; font-size: 0.9rem; color: #66fcf1; opacity: 0.8; }
        .main-container { width: 90%; max-width: 950px; margin-top: 1rem; flex: 1; }

        .search-section {
            background-color: var(--bg-card);
            padding: 1.2rem;
            border-radius: 12px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 2rem;
        }

        .search-box {
            display: flex;
            gap: 10px;
            background-color: rgba(0, 0, 0, 0.4);
            padding: 0.4rem;
            border-radius: 8px;
            border: 1px solid var(--accent-blue);
        }

        .search-box input {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            color: var(--text-white);
            font-size: 1rem;
            padding: 0.5rem;
        }

        .search-box button {
            background-color: var(--accent-blue);
            color: var(--bg-main);
            border: none;
            padding: 0 1.5rem;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .search-box button:hover {
            background-color: var(--accent-glow);
            box-shadow: 0 0 12px var(--accent-glow);
        }

        .section-title {
            font-size: 1.4rem;
            color: var(--text-white);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .live-pulse {
            width: 10px;
            height: 10px;
            background-color: var(--live-red);
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 59, 59, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 8px rgba(255, 59, 59, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 59, 59, 0); }
        }

        .matches-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 3rem;
        }

        .match-card {
            background-color: var(--bg-card);
            border-radius: 12px;
            padding: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
        }

        .match-card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%;
            background-color: var(--accent-blue);
        }

        .teams-container { display: flex; justify-content: space-around; align-items: center; margin: 1rem 0; }
        .team { display: flex; flex-direction: column; align-items: center; width: 40%; text-align: center; }
        .team img { width: 45px; height: 45px; object-fit: contain; margin-bottom: 0.5rem; background-color: rgba(255, 255, 255, 0.03); border-radius: 50%; padding: 4px; }
        .team-name { font-size: 0.85rem; font-weight: 600; color: var(--text-white); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; }
        .vs { font-size: 0.9rem; font-weight: bold; color: var(--accent-glow); }
        .match-title { font-size: 0.95rem; font-weight: bold; text-align: center; margin-bottom: 0.5rem; color: var(--text-white); }
        .stream-selectors { display: flex; flex-direction: column; gap: 8px; margin-top: 1rem; }

        .btn-stream {
            background-color: rgba(69, 243, 255, 0.1); color: var(--accent-blue);
            border: 1px solid var(--accent-blue); padding: 0.5rem; border-radius: 6px;
            font-size: 0.8rem; font-weight: bold; cursor: pointer; transition: all 0.2s;
            text-align: center; display: flex; justify-content: center; align-items: center; gap: 5px;
        }

        .btn-stream:hover { background-color: var(--accent-blue); color: var(--bg-main); box-shadow: 0 0 8px var(--accent-blue); }
        .loading, .no-matches { grid-column: 1 / -1; text-align: center; padding: 3rem; color: var(--text-light); font-size: 1.1rem; }
        .status-bar { text-align: center; font-size: 0.85rem; color: #45f3ff; padding: 1rem; border-top: 1px solid rgba(255, 255, 255, 0.05); width: 100%; box-sizing: border-box; }
        .status-bar .dot { width: 8px; height: 8px; background-color: var(--accent-glow); border-radius: 50%; display: inline-block; box-shadow: 0 0 8px var(--accent-glow); margin-right: 5px; }
    </style>

    <script src="https://proxy.budsin.dev/scram/scram.bundle.js" defer></script>
    <script src="https://proxy.budsin.dev/register-sw.js" defer></script>
</head>
<body>

    <header>
        <h1>Budsin <span>Football v4</span></h1>
        <div class="subtitle">Enrutamiento Nativo Scramjet Engine Engine</div>
    </header>

    <div class="main-container">
        <div class="search-section">
            <form id="proxy-form">
                <div class="search-box">
                    <input type="text" id="proxy-input" placeholder="Pegar enlace manual de partido alternativo..." autocomplete="off">
                    <button type="submit"><i class="fa-solid fa-play"></i> Enrutar</button>
                </div>
            </form>
        </div>

        <div class="section-title">
            <div class="live-pulse"></div>
            <span>Partidos en Vivo Ahora Mismo (Fútbol)</span>
        </div>

        <div class="matches-grid" id="live-matches-container">
            <div class="loading"><i class="fa-solid fa-spinner fa-spin"></i> Sincronizando con el controlador Scramjet...</div>
        </div>
    </div>

    <div class="status-bar">
        <span><div class="dot"></div> Enrutador perimetral Scramjet activo y mapeado</span>
    </div>

    <script>
        // Función puente para usar el sjUrl nativo del VPS adaptándolo al dominio local de GitHub
        function getScramjetUrl(targetUrl) {
            if (typeof sjUrl === 'function') {
                // Genera la ruta encriptada usando el algoritmo exacto de InvisiProxy
                const remotePath = sjUrl(targetUrl); 
                // Extraemos la parte relativa (/scramjet/... o tu prefijo personalizado)
                const urlObj = new URL(remotePath, 'https://proxy.budsin.dev');
                return window.location.origin + urlObj.pathname + urlObj.search;
            } else {
                // Fallback de emergencia por si el script tarda milisegundos en cargar
                return window.location.origin + '/scram/' + btoa(encodeURIComponent(targetUrl));
            }
        }

        async function initProxySystem() {
            const container = document.getElementById('live-matches-container');
            if ('serviceWorker' in navigator) {
                try {
                    // Registramos el worker local bajo el prefijo por defecto de Scramjet
                    await navigator.serviceWorker.register('./sw.js', { scope: '/scram/' });
                    await navigator.serviceWorker.ready;
                    
                    // Cargar el feed una vez que el túnel esté levantado
                    loadLiveMatches();
                } catch (err) {
                    container.innerHTML = `<div class="no-matches" style="color: var(--live-red);">Fallo de inicialización Scramjet: ${err.message}</div>`;
                }
            }
        }

        async function loadLiveMatches() {
            const container = document.getElementById('live-matches-container');
            try {
                const targetApiUrl = 'https://streamed.pk/api/matches/football';
                const proxiedFetchUrl = getScramjetUrl(targetApiUrl);

                const response = await fetch(proxiedFetchUrl);
                if (!response.ok) throw new Error("La API bloqueó el túnel o está fuera de línea.");
                
                const matches = await response.json();
                container.innerHTML = '';

                if (matches.length === 0) {
                    container.innerHTML = '<div class="no-matches">No hay eventos en vivo en este momento.</div>';
                    return;
                }

                matches.forEach(match => {
                    const matchCard = document.createElement('div');
                    matchCard.className = 'match-card';

                    const rawHomeBadge = match.teams?.home?.badge ? `https://streamed.pk/api/images/badge/${match.teams.home.badge}.webp` : '';
                    const rawAwayBadge = match.teams?.away?.badge ? `https://streamed.pk/api/images/badge/${match.teams.away.badge}.webp` : '';
                    
                    const homeBadge = rawHomeBadge ? getScramjetUrl(rawHomeBadge) : 'https://img.icons8.com/ios-filled/50/ffffff/football2.png';
                    const awayBadge = rawAwayBadge ? getScramjetUrl(rawAwayBadge) : 'https://img.icons8.com/ios-filled/50/ffffff/football2.png';

                    const homeName = match.teams?.home?.name || 'Local';
                    const awayName = match.teams?.away?.name || 'Visitante';

                    let streamsHtml = '';
                    match.sources.forEach((src, idx) => {
                        streamsHtml += `
                            <button class="btn-stream" onclick="fetchAndPlayStream('${src.source}', '${src.id}')">
                                <i class="fa-solid fa-play-circle"></i> Opción ${idx + 1} (${src.source.toUpperCase()})
                            </button>
                        `;
                    });

                    matchCard.innerHTML = `
                        <div class="match-title">${match.title}</div>
                        <div class="teams-container">
                            <div class="team">
                                <img src="${homeBadge}" alt="${homeName}" onerror="this.src='https://img.icons8.com/ios-filled/50/ffffff/football2.png'">
                                <div class="team-name">${homeName}</div>
                            </div>
                            <div class="vs">VS</div>
                            <div class="team">
                                <img src="${awayBadge}" alt="${awayName}" onerror="this.src='https://img.icons8.com/ios-filled/50/ffffff/football2.png'">
                                <div class="team-name">${awayName}</div>
                            </div>
                        </div>
                        <div class="stream-selectors">
                            ${streamsHtml}
                        </div>
                    `;
                    container.appendChild(matchCard);
                });

            } catch (error) {
                container.innerHTML = `<div class="no-matches" style="color: var(--live-red);"><i class="fa-solid fa-exclamation-triangle"></i> Error Scramjet API: ${error.message}</div>`;
            }
        }

        async function fetchAndPlayStream(source, id) {
            try {
                const targetStreamUrl = `https://streamed.pk/api/stream/${source}/${id}`;
                const proxiedStreamUrl = getScramjetUrl(targetStreamUrl);

                const res = await fetch(proxiedStreamUrl);
                if (!res.ok) throw new Error("No se pudo interceptar la respuesta de la señal.");
                
                const streams = await res.json();
                
                if (streams && streams.length > 0) {
                    const embedUrl = streams[0].embedUrl;
                    // Redirección nativa usando el motor Scramjet
                    window.location.href = getScramjetUrl(embedUrl);
                } else {
                    alert("Opción sin flujos de vídeo activos.");
                }
            } catch (err) {
                alert("Error de túnel: " + err.message);
            }
        }

        document.getElementById('proxy-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const inputVal = document.getElementById('proxy-input').value.trim();
            if (inputVal) window.location.href = getScramjetUrl(inputVal);
        });

        window.addEventListener('DOMContentLoaded', () => {
            // Un pequeño delay para asegurar la inyección de los scripts del VPS antes de arrancar
            setTimeout(initProxySystem, 500);
        });
    </script>
</body>
</html>
